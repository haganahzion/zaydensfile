      <rect x="620" y="400" width="14" height="38" fill="#1a0c04" rx="2"/>

      <text x="640" y="645" font-family="Georgia,serif" font-size="22" fill="rgba(200,180,140,0.65)" text-anchor="middle" font-style="italic">A Visual Analysis in Three Images</text>
